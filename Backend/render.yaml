services:
  - type: web
    name: job-portal-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: CLOUD_API
        sync: false
      - key: API_SECRET
        sync: false
      - key: RECRUITER_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
